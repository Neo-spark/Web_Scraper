version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16
    container_name: govcontacts_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: govcontacts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (visual DB browser) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: govcontacts_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@samparksetu.in
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

# ─────────────────────────────────────────────────────────────
# Usage:
#   docker-compose up -d          # start postgres + pgadmin
#   docker-compose down           # stop
#   docker-compose down -v        # stop AND delete data
#
# pgAdmin UI: http://localhost:5050
#   Email:    admin@samparksetu.in
#   Password: admin123
#   Then add server: host=postgres, port=5432, user=postgres, pass=yourpassword
# ─────────────────────────────────────────────────────────────
